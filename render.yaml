services:
  - type: web
    name: budgets-proxy
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.mjs
    envVars:
      - key: NODE_ENV
        sync: false
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
